<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hugga gran - Anmälan</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0a0e27 0%, #1a1f3a 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            color: #333;
        }

        .container {
            width: 100%;
            max-width: 600px;
            animation: fadeIn 0.8s ease-in-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
            animation: fadeUp 0.8s ease-in-out 0.2s both;
        }

        .header h1 {
            color: #2d5016;
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 0 2px 10px rgba(45, 80, 22, 0.3);
        }

        .header p {
            color: #e0e0e0;
            font-size: 1.1em;
            margin-bottom: 5px;
        }

        .info-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(45, 80, 22, 0.3);
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 25px;
            animation: fadeUp 0.8s ease-in-out 0.3s both;
        }

        .info-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 15px;
        }

        .info-item {
            background: rgba(255, 255, 255, 0.05);
            padding: 15px;
            border-radius: 10px;
            border-left: 3px solid #2d5016;
        }

        .info-label {
            color: #2d5016;
            font-size: 0.85em;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 5px;
        }

        .info-value {
            color: #ffffff;
            font-size: 1.05em;
            font-weight: 500;
        }

        .registration-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(45, 80, 22, 0.3);
            border-radius: 15px;
            padding: 30px;
            animation: fadeUp 0.8s ease-in-out 0.4s both;
        }

        .registration-card h2 {
            color: #2d5016;
            margin-bottom: 20px;
            font-size: 1.5em;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            color: #ffffff;
            margin-bottom: 8px;
            font-weight: 500;
            font-size: 0.95em;
        }

        input[type="text"],
        input[type="email"] {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid rgba(45, 80, 22, 0.3);
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.9);
            color: #333;
            font-size: 1em;
            transition: all 0.3s ease;
        }

        input[type="text"]:focus,
        input[type="email"]:focus {
            outline: none;
            border-color: #1DB5A0;
            background: #ffffff;
            box-shadow: 0 0 10px rgba(29, 181, 160, 0.3);
        }

        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #2d5016 0%, #1e3210 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1.05em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
            min-height: 48px;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(45, 80, 22, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        .button-secondary {
            background: rgba(45, 80, 22, 0.2);
            border: 2px solid #2d5016;
            color: #2d5016;
            margin-top: 10px;
        }

        .button-secondary:hover {
            background: rgba(45, 80, 22, 0.3);
        }

        .progress-section {
            margin-bottom: 25px;
            padding: 20px;
            background: rgba(45, 80, 22, 0.1);
            border-radius: 10px;
        }

        .progress-label {
            color: #2d5016;
            font-size: 0.95em;
            font-weight: 600;
            margin-bottom: 15px;
            text-align: center;
        }

        .participants-visualization {
            display: flex;
            justify-content: center;
            gap: 8px;
            flex-wrap: wrap;
        }

        .participant-slot {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5em;
            transition: all 0.3s ease;
            border: 2px solid;
            position: relative;
        }

        .participant-slot.available {
            background: transparent;
            border-color: rgba(45, 80, 22, 0.5);
            color: #2d5016;
        }

        .participant-slot.booked {
            background: linear-gradient(135deg, #2d5016 0%, #1e3210 100%);
            border-color: #2d5016;
            color: #ffffff;
        }

        .participant-slot.required::after {
            content: '';
            position: absolute;
            bottom: -8px;
            left: 50%;
            transform: translateX(-50%);
            width: 80%;
            height: 2px;
            background: #2d5016;
            border-radius: 1px;
        }

        .remaining-spots {
            margin-top: 20px;
            text-align: center;
            color: #2d5016;
            font-size: 1.3em;
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .message {
            padding: 12px 15px;
            border-radius: 8px;
            margin-bottom: 15px;
            font-weight: 500;
            display: none;
            animation: fadeUp 0.3s ease-in-out;
        }

        .message.show {
            display: block;
        }

        .message.success {
            background: rgba(76, 175, 80, 0.2);
            color: #4CAF50;
            border: 1px solid #4CAF50;
        }

        .message.error {
            background: rgba(244, 67, 54, 0.2);
            color: #F44336;
            border: 1px solid #F44336;
        }

        .admin-list-container {
            margin-top: 20px;
            max-height: 300px;
            overflow-y: auto;
        }

        .participant-item {
            background: rgba(255, 255, 255, 0.05);
            padding: 12px 15px;
            border-radius: 8px;
            margin-bottom: 8px;
            color: #ffffff;
            border-left: 3px solid #2d5016;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .participant-name {
            font-weight: 500;
        }

        .participant-number {
            color: #2d5016;
            font-size: 0.9em;
        }

        .spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 3px solid rgba(29, 181, 160, 0.3);
            border-top-color: #1DB5A0;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .admin-button {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: rgba(45, 80, 22, 0.3);
            border: 2px solid #2d5016;
            color: #2d5016;
            font-size: 1.5em;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            z-index: 100;
        }

        .admin-button:hover {
            background: rgba(45, 80, 22, 0.5);
            transform: scale(1.1);
        }

        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            animation: fadeIn 0.3s ease-in-out;
        }

        .modal.show {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .modal-content {
            background: linear-gradient(135deg, #0a0e27 0%, #1a1f3a 100%);
            border: 2px solid #2d5016;
            border-radius: 15px;
            padding: 30px;
            width: 90%;
            max-width: 500px;
            max-height: 80vh;
            overflow-y: auto;
            animation: fadeUp 0.3s ease-in-out;
        }

        .modal-header {
            color: #2d5016;
            font-size: 1.5em;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .close-button {
            background: none;
            border: none;
            color: #2d5016;
            font-size: 1.5em;
            cursor: pointer;
            width: auto;
            padding: 0;
            min-height: auto;
        }

        .close-button:hover {
            color: #ffffff;
        }

        .admin-list {
            margin-top: 20px;
        }

        .admin-item {
            background: rgba(255, 255, 255, 0.05);
            padding: 12px 15px;
            border-radius: 8px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-left: 3px solid #2d5016;
            color: #ffffff;
        }

        .delete-button {
            background: rgba(244, 67, 54, 0.3);
            border: 1px solid #F44336;
            color: #F44336;
            padding: 6px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.85em;
            transition: all 0.3s ease;
            min-height: auto;
            width: auto;
        }

        .delete-button:hover {
            background: rgba(244, 67, 54, 0.5);
        }

        .password-input {
            margin-bottom: 15px;
        }

        .admin-stats {
            background: rgba(45, 80, 22, 0.1);
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            color: #2d5016;
        }

        @media (max-width: 600px) {
            .header h1 {
                font-size: 2em;
            }

            .info-grid {
                grid-template-columns: 1fr;
            }

            .admin-button {
                bottom: 20px;
                right: 20px;
                width: 45px;
                height: 45px;
            }

            .modal-content {
                width: 95%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1 id="eventName">Hugga gran</h1>
            <p id="eventIntro">Här ska huggas den största granen!</p>
        </div>

        <div class="info-card">
            <div class="info-grid">
                <div class="info-item">
                    <div class="info-label">Datum</div>
                    <div class="info-value" id="eventDate">5 juli</div>
                </div>
                <div class="info-item">
                    <div class="info-label">Tid</div>
                    <div class="info-value" id="eventTime">14:00 - 15:15</div>
                </div>
                <div class="info-item">
                    <div class="info-label">Plats</div>
                    <div class="info-value" id="eventLocation">Skogen</div>
                </div>
                <div class="info-item">
                    <div class="info-label">Deltagare</div>
                    <div class="info-value"><span id="minParticipants">3</span> - <span id="maxParticipants">7</span></div>
                </div>
            </div>
        </div>

        <div class="registration-card">
            <h2>Anmäl dig</h2>

            <div id="message" class="message"></div>

            <div class="progress-section">
                <div class="progress-label">
                    Anmälda deltagare: <span id="currentCount">0</span>/<span id="maxCount">7</span>
                </div>
                <div class="participants-visualization" id="participantsVisualization"></div>
                <div class="remaining-spots" id="remainingSpots">7 PLATSER KVAR</div>
            </div>

            <form id="registrationForm">
                <div class="form-group">
                    <label for="nameInput">Namn *</label>
                    <input
                        type="text"
                        id="nameInput"
                        placeholder="Skriv ditt namn"
                        required
                        aria-label="Deltagarens namn"
                    >
                </div>

                <button type="submit">Anmäl mig</button>
            </form>
        </div>
    </div>

    <button class="admin-button" id="adminButton" aria-label="Öppna admin-panel">⚙️</button>

    <div id="adminModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <span>Admin Panel</span>
                <button class="close-button" id="closeModal">&times;</button>
            </div>

            <div class="password-input">
                <label for="adminPassword">Adminlösenord</label>
                <input
                    type="text"
                    id="adminPassword"
                    placeholder="Ange lösenord"
                    aria-label="Admin lösenord"
                >
                <button type="button" id="loginButton" class="button-secondary" style="margin-top: 10px;">Logga in</button>
            </div>

            <div id="adminContent" style="display: none;">
                <div class="admin-stats">
                    <div>Totalt anmälda: <strong id="adminCount">0</strong></div>
                    <div style="margin-top: 5px;">Kapacitet: <span id="adminMinMax">3-7</span></div>
                </div>

                <div class="admin-list-container">
                    <div class="admin-list" id="adminList"></div>
                </div>

                <button type="button" id="refreshButton" class="button-secondary" style="margin-top: 20px;">Uppdatera lista</button>
            </div>
        </div>
    </div>

    <script>
        // Firebase Configuration
        const firebaseConfig = {
            apiKey: "AIzaSyAAgD57MKlgqysUnR-pb559dZRBNRZwXD8",
            authDomain: "testelura.firebaseapp.com",
            databaseURL: "https://testelura-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "testelura",
            storageBucket: "testelura.firebasestorage.app",
            messagingSenderId: "670408355011",
            appId: "1:670408355011:web:d20002768f3f69869dc676"
        };

        // Configuration
        const CONFIG = {
            eventName: "Hugga gran",
            eventIntroInfo: "Här ska huggas den största granen!",
            eventDate: "5 juli",
            eventTime: "14:00 - 15:15",
            eventLocation: "Skogen",
            minParticipants: 3,
            maxParticipants: 7,
            adminPassword: "gran",
            eventPrice: "",
            eventExtra: ""
        };

        // Database references
        const DATABASE_URL = firebaseConfig.databaseURL;
        const PARTICIPANTS_PATH = "/participants";

        // State
        let isAdminLoggedIn = false;
        let participants = [];
        let pollInterval = null;

        // Apply configuration to DOM
        function applyConfig() {
            document.getElementById("eventName").textContent = CONFIG.eventName;
            document.getElementById("eventIntro").textContent = CONFIG.eventIntroInfo;
            document.getElementById("eventDate").textContent = CONFIG.eventDate;
            document.getElementById("eventTime").textContent = CONFIG.eventTime;
            document.getElementById("eventLocation").textContent = CONFIG.eventLocation;
            document.getElementById("minParticipants").textContent = CONFIG.minParticipants;
            document.getElementById("maxParticipants").textContent = CONFIG.maxParticipants;
            document.getElementById("maxCount").textContent = CONFIG.maxParticipants;
            document.getElementById("adminMinMax").textContent = `${CONFIG.minParticipants}-${CONFIG.maxParticipants}`;
        }

        // Firebase REST API calls
        async function getParticipants() {
            try {
                const response = await fetch(
                    `${DATABASE_URL}${PARTICIPANTS_PATH}.json`
                );
                if (!response.ok) throw new Error("Kunde inte hämta deltagare");
                const data = await response.json();
                return data ? Object.entries(data).map(([key, value]) => ({ id: key, ...value })) : [];
            } catch (error) {
                console.error("Fel vid hämtning av deltagare:", error);
                return [];
            }
        }

        async function addParticipant(name) {
            try {
                const response = await fetch(
                    `${DATABASE_URL}${PARTICIPANTS_PATH}.json`,
                    {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({
                            name: name,
                            timestamp: new Date().toISOString()
                        })
                    }
                );
                if (!response.ok) throw new Error("Kunde inte anmäla deltagare");
                return await response.json();
            } catch (error) {
                console.error("Fel vid anmälan:", error);
                throw error;
            }
        }

        async function deleteParticipant(id) {
            try {
                const response = await fetch(
                    `${DATABASE_URL}${PARTICIPANTS_PATH}/${id}.json`,
                    { method: "DELETE" }
                );
                if (!response.ok) throw new Error("Kunde inte ta bort deltagare");
            } catch (error) {
                console.error("Fel vid borttagning:", error);
                throw error;
            }
        }

        // Message display
        function showMessage(text, type) {
            const messageEl = document.getElementById("message");
            messageEl.textContent = text;
            messageEl.className = `message show ${type}`;
            setTimeout(() => messageEl.classList.remove("show"), 3000);
        }

        // Update participants visualization with person icons
        function updateParticipantsVisualization() {
            const visualization = document.getElementById("participantsVisualization");
            visualization.innerHTML = "";

            for (let i = 0; i < CONFIG.maxParticipants; i++) {
                const slot = document.createElement("div");
                slot.className = "participant-slot";

                // Check if this slot is booked or available
                const isBooked = i < participants.length;
                slot.classList.add(isBooked ? "booked" : "available");

                // Mark the first minParticipants slots with a line
                if (i < CONFIG.minParticipants) {
                    slot.classList.add("required");
                }

                // Booked slots show person icon, available slots are empty rings
                slot.textContent = isBooked ? "👤" : "";
                visualization.appendChild(slot);
            }

            document.getElementById("currentCount").textContent = participants.length;

            // Update remaining spots text
            const remaining = CONFIG.maxParticipants - participants.length;
            const spotsText = remaining === 1 ? "PLATS KVAR" : "PLATSER KVAR";
            document.getElementById("remainingSpots").textContent = `${remaining} ${spotsText}`;
        }

        // Update participants display
        function updateParticipantsDisplay() {
            const list = document.getElementById("participantsList");
            list.innerHTML = "";

            if (participants.length === 0) {
                list.innerHTML = '<div style="color: #999; text-align: center; padding: 20px;">Inga anmälda än</div>';
            } else {
                participants.forEach((p, index) => {
                    const item = document.createElement("div");
                    item.className = "participant-item";
                    item.innerHTML = `
                        <span class="participant-name">${escapeHtml(p.name)}</span>
                        <span class="participant-number">#${index + 1}</span>
                    `;
                    list.appendChild(item);
                });
            }

            updateParticipantsVisualization();
        }

        // Update admin list
        function updateAdminList() {
            const list = document.getElementById("adminList");
            list.innerHTML = "";

            if (participants.length === 0) {
                list.innerHTML = '<div style="color: #999; text-align: center; padding: 20px;">Inga anmälda än</div>';
            } else {
                participants.forEach((p, index) => {
                    const item = document.createElement("div");
                    item.className = "admin-item";
                    item.innerHTML = `
                        <div>
                            <div style="color: #2d5016; font-size: 0.85em; margin-bottom: 3px;">#${index + 1}</div>
                            <div>${escapeHtml(p.name)}</div>
                        </div>
                        <button class="delete-button" onclick="confirmDelete('${p.id}', '${escapeHtml(p.name).replace(/'/g, "\\'")}')">
                            Ta bort
                        </button>
                    `;
                    list.appendChild(item);
                });
            }

            document.getElementById("adminCount").textContent = participants.length;
        }

        // Update progress bar
        function updateProgress() {
            const current = participants.length;
            const max = CONFIG.maxParticipants;
            const min = CONFIG.minParticipants;
            const range = max - min;
            const progress = range > 0 ? Math.max(0, ((current - min) / range) * 100) : 100;

            document.getElementById("currentCount").textContent = current;
            document.getElementById("progressFill").style.width = Math.min(100, progress) + "%";
        }

        // Refresh data
        async function refreshData() {
            participants = await getParticipants();
            updateParticipantsDisplay();
            if (isAdminLoggedIn) {
                updateAdminList();
            }
        }

        // Delete confirmation
        async function confirmDelete(id, name) {
            if (confirm(`Är du säker på att du vill ta bort "${name}"?`)) {
                try {
                    await deleteParticipant(id);
                    await refreshData();
                    showMessage("Deltagare borttagen", "success");
                } catch (error) {
                    showMessage("Fel vid borttagning", "error");
                }
            }
        }

        // Escape HTML to prevent XSS
        function escapeHtml(text) {
            const map = {
                "&": "&amp;",
                "<": "&lt;",
                ">": "&gt;",
                '"': "&quot;",
                "'": "&#039;"
            };
            return text.replace(/[&<>"']/g, m => map[m]);
        }

        // Form submission
        document.getElementById("registrationForm").addEventListener("submit", async (e) => {
            e.preventDefault();

            const nameInput = document.getElementById("nameInput");
            const name = nameInput.value.trim();

            if (!name) {
                showMessage("Vänligen ange ditt namn", "error");
                return;
            }

            if (participants.some(p => p.name.toLowerCase() === name.toLowerCase())) {
                showMessage("Du är redan anmäld!", "error");
                return;
            }

            if (participants.length >= CONFIG.maxParticipants) {
                showMessage("Det är fullt! Vi kan inte ta emot fler anmälningar.", "error");
                return;
            }

            try {
                await addParticipant(name);
                nameInput.value = "";
                await refreshData();
                showMessage("Du är anmäld! 🎉", "success");
            } catch (error) {
                showMessage("Något gick fel vid anmälan", "error");
            }
        });

        // Prevent double submission with Enter key
        document.getElementById("nameInput").addEventListener("keypress", (e) => {
            if (e.key === "Enter") {
                e.preventDefault();
                document.getElementById("registrationForm").dispatchEvent(new Event("submit"));
            }
        });

        // Admin panel
        document.getElementById("adminButton").addEventListener("click", () => {
            document.getElementById("adminModal").classList.add("show");
        });

        document.getElementById("closeModal").addEventListener("click", () => {
            document.getElementById("adminModal").classList.remove("show");
            isAdminLoggedIn = false;
            document.getElementById("adminContent").style.display = "none";
            document.getElementById("passwordInput").value = "";
        });

        document.getElementById("loginButton").addEventListener("click", () => {
            const password = document.getElementById("adminPassword").value;
            if (password === CONFIG.adminPassword) {
                isAdminLoggedIn = true;
                document.getElementById("adminContent").style.display = "block";
                document.getElementById("adminPassword").style.display = "none";
                document.getElementById("loginButton").style.display = "none";
                updateAdminList();
            } else {
                showMessage("Fel lösenord!", "error");
            }
        });

        document.getElementById("refreshButton").addEventListener("click", refreshData);

        // Close modal on outside click
        document.getElementById("adminModal").addEventListener("click", (e) => {
            if (e.target === document.getElementById("adminModal")) {
                document.getElementById("adminModal").classList.remove("show");
                isAdminLoggedIn = false;
                document.getElementById("adminContent").style.display = "none";
                document.getElementById("adminPassword").value = "";
            }
        });

        // Initialize
        applyConfig();
        updateParticipantsVisualization();
        refreshData();

        // Poll for updates every 5 seconds
        pollInterval = setInterval(refreshData, 5000);

        // Cleanup on page unload
        window.addEventListener("beforeunload", () => {
            if (pollInterval) clearInterval(pollInterval);
        });
    </script>
</body>
</html>
