<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hejjahopp - Anmälningsformulär</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --teal: #1DB5A0;
      --teal-dark: #169c8a;
      --teal-light: #25d4bc;
      --bg-dark: #0a0e27;
      --bg-mid: #1a1f3a;
      --glass: rgba(255,255,255,0.06);
      --glass-border: rgba(255,255,255,0.12);
      --text: #e8eaf6;
      --text-muted: #9ca3c4;
      --error: #ff6b6b;
      --success: #51cf66;
    }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: linear-gradient(135deg, var(--bg-dark) 0%, var(--bg-mid) 100%);
      min-height: 100vh;
      color: var(--text);
      padding: 20px;
    }

    @keyframes fadeIn  { from { opacity: 0; } to { opacity: 1; } }
    @keyframes fadeUp  { from { opacity: 0; transform: translateY(24px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes spin    { to { transform: rotate(360deg); } }
    @keyframes pulse   { 0%,100% { opacity: 1; } 50% { opacity: .5; } }

    .page-wrapper {
      max-width: 760px;
      margin: 0 auto;
      animation: fadeIn .6s ease;
    }

    /* ---- HEADER ---- */
    .header {
      text-align: center;
      padding: 48px 24px 32px;
      animation: fadeUp .6s ease;
    }
    .header .badge {
      display: inline-block;
      background: rgba(29,181,160,.15);
      border: 1px solid rgba(29,181,160,.35);
      color: var(--teal);
      font-size: .78rem;
      font-weight: 600;
      letter-spacing: .08em;
      text-transform: uppercase;
      padding: 6px 16px;
      border-radius: 100px;
      margin-bottom: 18px;
    }
    .header h1 {
      font-size: clamp(2rem, 6vw, 3rem);
      font-weight: 700;
      background: linear-gradient(135deg, #fff 30%, var(--teal-light));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1.15;
      margin-bottom: 10px;
    }
    .header .tagline {
      color: var(--text-muted);
      font-size: 1rem;
    }

    /* ---- CARDS ---- */
    .card {
      background: var(--glass);
      border: 1px solid var(--glass-border);
      border-radius: 20px;
      padding: 32px;
      margin-bottom: 20px;
      backdrop-filter: blur(12px);
      animation: fadeUp .7s ease both;
    }
    .card:nth-child(2) { animation-delay: .05s; }
    .card:nth-child(3) { animation-delay: .10s; }

    .card-title {
      font-size: .75rem;
      font-weight: 700;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: var(--teal);
      margin-bottom: 22px;
    }

    /* ---- INFO GRID ---- */
    .info-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 16px;
    }
    .info-item {
      background: rgba(255,255,255,.04);
      border: 1px solid var(--glass-border);
      border-radius: 12px;
      padding: 16px;
    }
    .info-item .label {
      font-size: .72rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: .07em;
      margin-bottom: 6px;
    }
    .info-item .value {
      font-size: 1rem;
      font-weight: 600;
    }
    .info-item .value.teal { color: var(--teal); }

    /* ---- SPOTS ---- */
    .spots-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
    }
    .spots-row .spots-text { font-size: .9rem; color: var(--text-muted); }
    .spots-row .spots-count { font-size: .9rem; font-weight: 600; }
    .progress-track {
      width: 100%;
      height: 8px;
      background: rgba(255,255,255,.08);
      border-radius: 100px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--teal), var(--teal-light));
      border-radius: 100px;
      transition: width .5s ease;
      width: 0%;
    }

    /* ---- FORM ---- */
    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }
    @media (max-width: 520px) { .form-grid { grid-template-columns: 1fr; } }
    .form-grid .full { grid-column: 1 / -1; }

    .field { display: flex; flex-direction: column; gap: 7px; }
    .field label { font-size: .82rem; color: var(--text-muted); font-weight: 500; }
    .field label .opt { opacity: .55; font-weight: 400; }

    .field input {
      background: rgba(255,255,255,.07);
      border: 1px solid var(--glass-border);
      border-radius: 10px;
      color: var(--text);
      font-size: .97rem;
      padding: 13px 16px;
      outline: none;
      transition: border-color .2s, background .2s;
      min-height: 48px;
    }
    .field input::placeholder { color: rgba(255,255,255,.25); }
    .field input:focus {
      border-color: var(--teal);
      background: rgba(29,181,160,.08);
    }
    .field input.error { border-color: var(--error); }

    .btn-submit {
      width: 100%;
      margin-top: 20px;
      padding: 15px;
      background: linear-gradient(135deg, var(--teal), var(--teal-dark));
      border: none;
      border-radius: 12px;
      color: #fff;
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: .04em;
      cursor: pointer;
      min-height: 52px;
      transition: opacity .2s, transform .15s;
    }
    .btn-submit:hover:not(:disabled) { opacity: .88; transform: translateY(-1px); }
    .btn-submit:disabled { opacity: .45; cursor: not-allowed; }

    /* ---- MESSAGES ---- */
    .msg {
      margin-top: 16px;
      padding: 13px 18px;
      border-radius: 10px;
      font-size: .92rem;
      font-weight: 500;
      display: none;
    }
    .msg.success { background: rgba(81,207,102,.12); border: 1px solid rgba(81,207,102,.3); color: var(--success); display: block; }
    .msg.error   { background: rgba(255,107,107,.12); border: 1px solid rgba(255,107,107,.3); color: var(--error); display: block; }

    /* ---- SPINNER ---- */
    .spinner {
      display: inline-block;
      width: 18px; height: 18px;
      border: 2px solid rgba(255,255,255,.2);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin .7s linear infinite;
      vertical-align: middle;
      margin-right: 8px;
    }

    /* ---- ADMIN LINK ---- */
    .admin-link-row {
      text-align: center;
      padding: 10px 0 40px;
    }
    .admin-link {
      background: none;
      border: none;
      color: var(--text-muted);
      font-size: .82rem;
      cursor: pointer;
      text-decoration: underline;
      text-underline-offset: 3px;
      transition: color .2s;
    }
    .admin-link:hover { color: var(--teal); }

    /* ---- MODAL OVERLAY ---- */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.65);
      backdrop-filter: blur(4px);
      z-index: 100;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .modal-overlay.open { display: flex; }

    .modal {
      background: linear-gradient(145deg, #12172e, #1e2444);
      border: 1px solid var(--glass-border);
      border-radius: 20px;
      padding: 36px;
      width: 100%;
      max-width: 620px;
      max-height: 90vh;
      overflow-y: auto;
      animation: fadeUp .3s ease;
    }
    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
    }
    .modal-header h2 { font-size: 1.25rem; font-weight: 700; }
    .modal-close {
      background: none;
      border: none;
      color: var(--text-muted);
      font-size: 1.6rem;
      cursor: pointer;
      line-height: 1;
      transition: color .2s;
    }
    .modal-close:hover { color: var(--text); }

    /* ---- ADMIN LOGIN ---- */
    #adminLoginForm .field { margin-bottom: 16px; }
    #adminLoginForm .field input { width: 100%; }
    #adminLoginError { color: var(--error); font-size: .85rem; margin-top: 8px; display: none; }

    /* ---- PARTICIPANTS TABLE ---- */
    .admin-stats {
      display: flex;
      gap: 12px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }
    .stat-chip {
      background: rgba(29,181,160,.1);
      border: 1px solid rgba(29,181,160,.25);
      border-radius: 8px;
      padding: 8px 14px;
      font-size: .84rem;
      color: var(--teal);
      font-weight: 600;
    }

    .participants-list { display: flex; flex-direction: column; gap: 10px; }
    .participant-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: rgba(255,255,255,.04);
      border: 1px solid var(--glass-border);
      border-radius: 10px;
      padding: 12px 16px;
      gap: 12px;
    }
    .participant-info { flex: 1; min-width: 0; }
    .participant-name { font-weight: 600; font-size: .95rem; word-break: break-word; }
    .participant-meta { font-size: .78rem; color: var(--text-muted); margin-top: 3px; word-break: break-all; }
    .participant-num {
      background: rgba(29,181,160,.15);
      color: var(--teal);
      border-radius: 6px;
      padding: 2px 8px;
      font-size: .78rem;
      font-weight: 700;
      white-space: nowrap;
    }
    .btn-delete {
      background: rgba(255,107,107,.1);
      border: 1px solid rgba(255,107,107,.25);
      color: var(--error);
      border-radius: 8px;
      padding: 7px 12px;
      font-size: .82rem;
      cursor: pointer;
      white-space: nowrap;
      transition: background .2s;
    }
    .btn-delete:hover { background: rgba(255,107,107,.22); }

    .admin-empty {
      text-align: center;
      color: var(--text-muted);
      padding: 32px 0;
      font-size: .9rem;
    }

    .admin-refresh {
      background: rgba(255,255,255,.06);
      border: 1px solid var(--glass-border);
      color: var(--text);
      border-radius: 8px;
      padding: 8px 16px;
      font-size: .84rem;
      cursor: pointer;
      margin-bottom: 16px;
      transition: background .2s;
    }
    .admin-refresh:hover { background: rgba(255,255,255,.1); }

    /* ---- LOADING OVERLAY ---- */
    .loading-row {
      text-align: center;
      padding: 20px 0;
      color: var(--text-muted);
      font-size: .9rem;
      animation: pulse 1.4s ease infinite;
    }
  </style>
</head>
<body>

<div class="page-wrapper">

  <!-- HEADER -->
  <header class="header">
    <div class="badge">Anmälan öppen</div>
    <h1 id="headerTitle">Hejjahopp</h1>
    <p class="tagline" id="headerTagline">Välkommen - säkra din plats redan idag!</p>
  </header>

  <!-- INFO CARD -->
  <div class="card">
    <div class="card-title">Eventinformation</div>
    <div class="info-grid">
      <div class="info-item">
        <div class="label">Datum</div>
        <div class="value" id="infoDate"></div>
      </div>
      <div class="info-item">
        <div class="label">Tid</div>
        <div class="value" id="infoTime"></div>
      </div>
      <div class="info-item">
        <div class="label">Plats</div>
        <div class="value" id="infoLocation"></div>
      </div>
      <div class="info-item">
        <div class="label">Pris</div>
        <div class="value teal" id="infoPrice"></div>
      </div>
    </div>

    <div style="margin-top:24px;">
      <div class="spots-row">
        <span class="spots-text">Tillgängliga platser</span>
        <span class="spots-count"><span id="spotsLeft">-</span> / <span id="spotsTotal">-</span></span>
      </div>
      <div class="progress-track"><div class="progress-fill" id="progressBar"></div></div>
    </div>
  </div>

  <!-- REGISTRATION CARD -->
  <div class="card">
    <div class="card-title">Anmäl dig</div>

    <div class="form-grid">
      <div class="field">
        <label for="fieldName">Namn <span style="color:var(--error)">*</span></label>
        <input id="fieldName" type="text" placeholder="Ditt fullständiga namn" autocomplete="name" />
      </div>
      <div class="field">
        <label for="fieldEmail">E-post <span style="color:var(--error)">*</span></label>
        <input id="fieldEmail" type="email" placeholder="din@epost.se" autocomplete="email" />
      </div>
      <div class="field">
        <label for="fieldPhone">Telefon <span style="color:var(--error)">*</span></label>
        <input id="fieldPhone" type="tel" placeholder="+46 70 000 00 00" autocomplete="tel" />
      </div>
      <div class="field">
        <label for="fieldOrg">Organisation <span class="opt">(valfritt)</span></label>
        <input id="fieldOrg" type="text" placeholder="Företag / förening" />
      </div>
    </div>

    <button class="btn-submit" id="btnSubmit" onclick="submitRegistration()">Anmäl mig</button>
    <div class="msg" id="formMsg"></div>
  </div>

  <!-- ADMIN LINK -->
  <div class="admin-link-row">
    <button class="admin-link" onclick="openAdminModal()">Adminpanel</button>
  </div>

</div><!-- /page-wrapper -->

<!-- ============================================================
     ADMIN MODAL
     ============================================================ -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal" id="modalContent">

    <!-- LOGIN VIEW -->
    <div id="adminLoginView">
      <div class="modal-header">
        <h2>Adminpanel</h2>
        <button class="modal-close" onclick="closeAdminModal()">&times;</button>
      </div>
      <div id="adminLoginForm">
        <div class="field">
          <label for="adminPwInput">Lösenord</label>
          <input id="adminPwInput" type="password" placeholder="Ange lösenord" onkeydown="if(event.key==='Enter')verifyAdmin()" />
        </div>
        <button class="btn-submit" onclick="verifyAdmin()">Logga in</button>
        <div id="adminLoginError">Fel lösenord. Försök igen.</div>
      </div>
    </div>

    <!-- PANEL VIEW -->
    <div id="adminPanelView" style="display:none;">
      <div class="modal-header">
        <h2>Deltagare</h2>
        <button class="modal-close" onclick="closeAdminModal()">&times;</button>
      </div>
      <div class="admin-stats">
        <div class="stat-chip">Anmälda: <span id="adminCount">0</span></div>
        <div class="stat-chip">Max: <span id="adminMax">0</span></div>
        <div class="stat-chip">Kvar: <span id="adminLeft">0</span></div>
      </div>
      <button class="admin-refresh" onclick="loadAdminParticipants()">Uppdatera lista</button>
      <div id="adminList"><div class="loading-row">Laddar...</div></div>
    </div>

  </div>
</div>

<!-- ============================================================
     FIREBASE + APP LOGIC
     ============================================================ -->
<script type="module">
  import { initializeApp }       from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { getDatabase, ref, push, get, remove, onValue }
    from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

  // ---- Firebase config ----
  const firebaseConfig = {
    apiKey: "AIzaSyAAgD57MKlgqysUnR-pb559dZRBNRZwXD8",
    authDomain: "testelura.firebaseapp.com",
    databaseURL: "https://testelura-default-rtdb.europe-west1.firebasedatabase.app",
    projectId: "testelura",
    storageBucket: "testelura.firebasestorage.app",
    messagingSenderId: "670408355011",
    appId: "1:670408355011:web:d20002768f3f69869dc676"
  };

  // ---- Event config ----
  const CONFIG = {
    eventName:       "Hejjahopp",
    eventTagline:    "Välkommen - säkra din plats redan idag!",
    eventDate:       "16 maj 2026",
    eventTime:       "14:00 - 16:00",
    eventLocation:   "Nära Globen",
    eventPrice:      "Gratis",
    maxParticipants: 22,
    adminPassword:   "admin",
    eventExtra:      "",
    dbPath:          "registrations/hejjahopp"
  };

  // ---- Init ----
  const app = initializeApp(firebaseConfig);
  const db  = getDatabase(app);
  const regRef = ref(db, CONFIG.dbPath);

  // ---- Populate DOM from config ----
  function applyConfig() {
    document.title                         = CONFIG.eventName + " - Anmälningsformulär";
    document.getElementById("headerTitle").textContent   = CONFIG.eventName;
    document.getElementById("headerTagline").textContent = CONFIG.eventTagline;
    document.getElementById("infoDate").textContent      = CONFIG.eventDate;
    document.getElementById("infoTime").textContent      = CONFIG.eventTime;
    document.getElementById("infoLocation").textContent  = CONFIG.eventLocation;
    document.getElementById("infoPrice").textContent     = CONFIG.eventPrice;
    document.getElementById("adminMax").textContent      = CONFIG.maxParticipants;
    document.getElementById("spotsTotal").textContent    = CONFIG.maxParticipants;
  }
  applyConfig();

  // ---- Escape HTML ----
  function esc(s) {
    return String(s)
      .replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")
      .replace(/"/g,"&quot;").replace(/'/g,"&#39;");
  }

  // ---- Update spots UI ----
  function updateSpots(count) {
    const left = Math.max(0, CONFIG.maxParticipants - count);
    document.getElementById("spotsLeft").textContent = left;
    const pct = Math.min(100, (count / CONFIG.maxParticipants) * 100);
    document.getElementById("progressBar").style.width = pct + "%";
    const btn = document.getElementById("btnSubmit");
    if (left === 0) {
      btn.disabled = true;
      btn.textContent = "Fullbokat";
    } else {
      btn.disabled = false;
      btn.textContent = "Anmäl mig";
    }
  }

  // ---- Real-time listener ----
  onValue(regRef, snap => {
    const count = snap.exists() ? Object.keys(snap.val()).length : 0;
    updateSpots(count);
  });

  // ---- Show message ----
  function showMsg(text, type) {
    const el = document.getElementById("formMsg");
    el.textContent = text;
    el.className = "msg " + type;
    setTimeout(() => { el.className = "msg"; el.textContent = ""; }, 6000);
  }

  // ---- Submit registration ----
  async function submitRegistration() {
    const nameEl  = document.getElementById("fieldName");
    const emailEl = document.getElementById("fieldEmail");
    const phoneEl = document.getElementById("fieldPhone");
    const orgEl   = document.getElementById("fieldOrg");
    const btn     = document.getElementById("btnSubmit");

    // Clear previous errors
    [nameEl, emailEl, phoneEl].forEach(el => el.classList.remove("error"));

    const name  = nameEl.value.trim();
    const email = emailEl.value.trim();
    const phone = phoneEl.value.trim();
    const org   = orgEl.value.trim();

    // Validation
    let valid = true;
    if (!name)  { nameEl.classList.add("error");  valid = false; }
    if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email))
                { emailEl.classList.add("error"); valid = false; }
    if (!phone) { phoneEl.classList.add("error"); valid = false; }
    if (!valid) { showMsg("Vänligen fyll i alla obligatoriska fält korrekt.", "error"); return; }

    // Disable button & show spinner
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span>Skickar...';

    try {
      // Check capacity
      const snap  = await get(regRef);
      const count = snap.exists() ? Object.keys(snap.val()).length : 0;
      if (count >= CONFIG.maxParticipants) {
        showMsg("Tyvärr är eventet fullbokat.", "error");
        btn.disabled = false; btn.textContent = "Fullbokat"; return;
      }

      // Check duplicate email
      if (snap.exists()) {
        const existing = Object.values(snap.val());
        if (existing.some(p => p.email && p.email.toLowerCase() === email.toLowerCase())) {
          showMsg("Denna e-postadress är redan anmäld.", "error");
          btn.disabled = false; btn.textContent = "Anmäl mig"; return;
        }
      }

      // Save
      await push(regRef, {
        name,
        email,
        phone,
        org: org || null,
        registeredAt: new Date().toISOString()
      });

      showMsg("Du är nu anmäld till " + CONFIG.eventName + "! Vi ses den " + CONFIG.eventDate + ".", "success");
      nameEl.value = ""; emailEl.value = ""; phoneEl.value = ""; orgEl.value = "";

    } catch (err) {
      console.error(err);
      showMsg("Något gick fel. Kontrollera din internetanslutning och försök igen.", "error");
    } finally {
      if (!btn.disabled) { /* already re-enabled above on errors */ }
      btn.disabled = false;
      btn.textContent = "Anmäl mig";
    }
  }

  // ---- Admin modal ----
  function openAdminModal() {
    document.getElementById("modalOverlay").classList.add("open");
    document.getElementById("adminPwInput").focus();
  }
  function closeAdminModal() {
    document.getElementById("modalOverlay").classList.remove("open");
    document.getElementById("adminLoginView").style.display  = "block";
    document.getElementById("adminPanelView").style.display  = "none";
    document.getElementById("adminPwInput").value            = "";
    document.getElementById("adminLoginError").style.display = "none";
  }

  function verifyAdmin() {
    const pw = document.getElementById("adminPwInput").value;
    if (pw === CONFIG.adminPassword) {
      document.getElementById("adminLoginView").style.display = "none";
      document.getElementById("adminPanelView").style.display = "block";
      loadAdminParticipants();
    } else {
      document.getElementById("adminLoginError").style.display = "block";
    }
  }

  async function loadAdminParticipants() {
    const listEl = document.getElementById("adminList");
    listEl.innerHTML = '<div class="loading-row">Laddar...</div>';
    try {
      const snap = await get(regRef);
      if (!snap.exists()) {
        listEl.innerHTML = '<div class="admin-empty">Inga anmälningar ännu.</div>';
        document.getElementById("adminCount").textContent = "0";
        document.getElementById("adminLeft").textContent  = CONFIG.maxParticipants;
        return;
      }
      const data    = snap.val();
      const entries = Object.entries(data)
        .sort((a,b) => (a[1].registeredAt||"").localeCompare(b[1].registeredAt||""));

      document.getElementById("adminCount").textContent = entries.length;
      document.getElementById("adminLeft").textContent  = Math.max(0, CONFIG.maxParticipants - entries.length);

      listEl.innerHTML = "";
      entries.forEach(([key, p], i) => {
        const row = document.createElement("div");
        row.className = "participant-row";
        row.innerHTML = `
          <span class="participant-num">#${i+1}</span>
          <div class="participant-info">
            <div class="participant-name">${esc(p.name)}</div>
            <div class="participant-meta">${esc(p.email)}${p.phone ? " &bull; " + esc(p.phone) : ""}${p.org ? " &bull; " + esc(p.org) : ""}</div>
          </div>
          <button class="btn-delete" onclick="deleteParticipant('${esc(key)}', '${esc(p.name)}')">Ta bort</button>
        `;
        listEl.appendChild(row);
      });
    } catch (err) {
      console.error(err);
      listEl.innerHTML = '<div class="admin-empty" style="color:var(--error)">Kunde inte hämta deltagare. Kontrollera Firebase-inställningar.</div>';
    }
  }

  async function deleteParticipant(key, name) {
    if (!confirm("Ta bort " + name + " från listan?")) return;
    try {
      await remove(ref(db, CONFIG.dbPath + "/" + key));
      loadAdminParticipants();
    } catch (err) {
      console.error(err);
      alert("Kunde inte ta bort deltagaren. Försök igen.");
    }
  }

  // ---- Expose to global scope for onclick attributes ----
  window.submitRegistration    = submitRegistration;
  window.openAdminModal        = openAdminModal;
  window.closeAdminModal       = closeAdminModal;
  window.verifyAdmin           = verifyAdmin;
  window.loadAdminParticipants = loadAdminParticipants;
  window.deleteParticipant     = deleteParticipant;

  // ---- Close modal on overlay click ----
  document.getElementById("modalOverlay").addEventListener("click", e => {
    if (e.target === document.getElementById("modalOverlay")) closeAdminModal();
  });

  // ---- Enter key on registration fields ----
  ["fieldName","fieldEmail","fieldPhone","fieldOrg"].forEach(id => {
    document.getElementById(id).addEventListener("keydown", e => {
      if (e.key === "Enter") submitRegistration();
    });
  });

</script>
</body>
</html>
